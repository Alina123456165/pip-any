<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        // Fix cross-origin naming formatting
        targetUrl = decodeURIComponent(targetUrl);
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        const img = new Image();
        img.crossOrigin = "anonymous"; 

        // Primary lighting fast backup engine
        img.src = "https://wp.com" + encodeURIComponent(targetUrl) + "?w=600&h=1000";

        img.onload = function() {
            startCanvasStream();
        };

        img.onerror = function() {
            // IF SERVER FAILS: Draw a clean fallback display window text layer immediately so it doesn't stay black
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 28px sans-serif";
            ctx.fillText("Loading Wikipedia View...", 50, 150);
            ctx.font = "20px sans-serif";
            ctx.fillStyle = "#888888";
            ctx.fillText(targetUrl.substring(0, 45) + "...", 50, 200);
            
            // Build the video link manually out of the local canvas drawing
            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play().catch(e => console.log("Ready"));
        };

        function startCanvasStream() {
            setInterval(() => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }, 100);
            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play().catch(e => console.log("Active"));
        }
    </script>
</body>
</html>
