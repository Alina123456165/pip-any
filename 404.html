<script>
    const video = document.getElementById('pipVideo');
    const button = document.getElementById('pipBtn');
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');

    const urlParams = new URLSearchParams(window.location.search);
    let targetUrl = urlParams.get('url') || "https://wikipedia.org";

    targetUrl = decodeURIComponent(targetUrl);
    if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

    const img = new Image();
    img.crossOrigin = "anonymous"; 
    img.src = "https://wp.com" + encodeURIComponent(targetUrl) + "?w=600&h=1000";

    img.onload = function() {
        startCanvasStream();
    };

    img.onerror = function() {
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("Loading Wikipedia View...", 50, 150);
        ctx.font = "20px sans-serif";
        ctx.fillStyle = "#888888";
        ctx.fillText(targetUrl.substring(0, 45) + "...", 50, 200);
        
        setupStream();
    };

    function setupStream() {
        const stream = canvas.captureStream(10); 
        video.srcObject = stream;
    }

    function startCanvasStream() {
        setInterval(() => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }, 100);
        setupStream();
    }

    // THE MISSING LINK: Click Handler for PiP Trigger
    button.addEventListener('click', async () => {
        try {
            // Force play video on user click context
            await video.play();
            // Fire the Native iOS Picture in Picture window
            await video.requestPictureInPicture();
        } catch (err) {
            console.error("PiP failed: ", err);
            alert("PiP blocked. Open this page in Safari directly.");
        }
    });
</script>
