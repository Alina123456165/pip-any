<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        // Bypasses iOS URL stripping by extracting the webpage string directly from the folder path name
        let pathName = window.location.pathname.split('/').pop();
        let targetUrl = "https://wikipedia.org";

        if (pathName && pathName !== "pip-any" && pathName !== "404.html") {
            try {
                // Decode the base64 URL path chunk back into a clean website link
                targetUrl = atob(pathName);
            } catch(e) {
                console.log("Error decoding path string, using default fallback.");
            }
        }

        // Clean link to ensure it's running the mobile layout
        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }

        // Ensure secure http protocol header is appended correctly
        if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
            targetUrl = 'https://' + targetUrl;
        }

        const img = new Image();
        img.crossOrigin = "anonymous"; 

        // Universal proxy engine renders the target site layout instantly
        img.src = "https://thum.io" + targetUrl;

        img.onload = function() {
            // Keep painting the screenshot to keep the video stream track alive
            setInterval(() => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }, 100);

            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play().catch(e => console.log("Awaiting user interaction"));
        };

        button.addEventListener('click', async () => {
            try {
                await video.play();
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    button.style.display = 'none';
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    button.style.display = 'none';
                }
            } catch (err) {
                alert("Canvas pipeline initializing. Tap once more.");
            }
        });
    </script>
</body>
</html>
