<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        #pipBtn:active { background: #0056b3; }
        /* Live Frame View Container */
        #webFrame {
            position: absolute; top: 0; left: 0; width: 600px; height: 1000px;
            border: none; transform-origin: top left; z-index: 1;
        }
        canvas { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; z-index: 2; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP LIVE PAGE INTO FLOATING WINDOW ⚡️</button>
    <iframe id="webFrame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const frame = document.getElementById('webFrame');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        // Route the live website straight into the embedded frame viewport
        frame.src = targetUrl;

        function updateCanvasStream() {
            try {
                // Wipe previous frame
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw the actual live iframe layer pixels straight onto the streaming canvas matrix
                ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
            } catch (e) {
                // Fallback indicator overlay block if cross-origin security rules get tight
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 24px sans-serif";
                ctx.fillText("Streaming Native Web Frame...", 50, 200);
            }
        }

        // Lock frame updates directly to keep the video context fluid
        setInterval(updateCanvasStream, 33);

        let streamCapture = canvas.captureStream(30); 
        video.srcObject = streamCapture;

        button.addEventListener('click', async () => {
            try {
                streamCapture = canvas.captureStream(30);
                video.srcObject = streamCapture;
                
                await video.play();

                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error(err);
                streamCapture = canvas.captureStream(30);
                video.srcObject = streamCapture;
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
