<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* The Wrapper Button Styling */
        #btnContainer { 
            position: absolute; top: 10px; left: 5%; width: 90%; height: 55px; 
            background: #007AFF; border-radius: 12px; z-index: 10;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* TEXT OVERLAY: Positioned directly beneath the transparent video */
        #btnText {
            position: absolute; width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-size: 16px; font-weight: bold; pointer-events: none; z-index: 11;
        }

        /* HARDWARE TRICK: The video fills the entire button layout! */
        /* It is completely visible to iOS, but we use a mix-blend mode to make it clear */
        #pipVideo { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.15; 
            z-index: 12; position: absolute; top: 0; left: 0; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="btnContainer">
        <div id="btnText">👉 Tap to Float Page (PiP) 👈</div>
        <!-- Changing the stream source to a highly optimized lightweight video loop -->
        <video id="pipVideo" playsinline muted loop src="https://googleapis.com"></video>
    </div>
    
    <iframe src="about:blank" id="webFrame"></iframe>

    <script>
        const video = document.getElementById('pipVideo');
        const container = document.getElementById('btnContainer');
        const frame = document.getElementById('webFrame');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url');

        if (!targetUrl) {
            targetUrl = "https://wikipedia.org";
        } else {
            if(targetUrl.includes("en.wikipedia.org")) {
                targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
            }
        }
        
        frame.src = targetUrl;

        // Force stream to pre-buffer as soon as page loads
        window.addEventListener('DOMContentLoaded', () => {
            video.load();
        });

        // Your touch event handles the raw video window element directly
        video.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await video.play();
                
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    container.style.display = 'none'; 
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    container.style.display = 'none';
                }
            } catch (err) {
                // Double layout retry loop fallback
                try {
                    video.webkitSetPresentationMode('picture-in-picture');
                    container.style.display = 'none';
                } catch(fallbackErr) {
                    alert("Pipeline stalling. Please reload page and tap again.");
                }
            }
        });
    </script>
</body>
</html>
