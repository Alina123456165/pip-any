<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #202124; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        /* Hidden canvas that changes static content into video packets */
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <iframe src="about:blank" id="webFrame"></iframe>

    <canvas id="renderCanvas" width="400" height="600"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const frame = document.getElementById('webFrame');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        // Grab current link from Siri Share Sheet input 
        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";
        if(targetUrl.includes("en.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }
        frame.src = targetUrl;

        // CANVAS STREAM GENERATOR: Converts text views into an active media loop
        function startCanvasStream() {
            ctx.fillStyle = "#202124";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.font = "20px Arial";
            ctx.fillText("Wikipedia Snapshot", 20, 50);
            
            // Generate a real 10fps fake video stream track out of the static canvas
            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play();
        }

        window.addEventListener('DOMContentLoaded', startCanvasStream);

        button.addEventListener('click', async () => {
            try {
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    button.style.display = 'none';
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    button.style.display = 'none';
                }
            } catch (err) {
                alert("Please wait 2 seconds for canvas to buffer and try tap again.");
            }
        });
    </script>
</body>
</html>
