<!DOCTYPE html>
<html>
<body>
    <button id="btn" style="padding:50px; font-size:30px;">CLICK TO START PIP</button>
    
    <video id="v" playsinline muted style="display:none;">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
    </video>

    <script>
        const btn = document.getElementById('btn');
        const v = document.getElementById('v');

        btn.onclick = async () => {
            try {
                // Force load
                v.load();
                // Force play
                await v.play();
                // Trigger PiP
                if (v.webkitSupportsPresentationMode('picture-in-picture')) {
                    v.webkitSetPresentationMode('picture-in-picture');
                } else {
                    alert('Your browser doesn’t support PiP.');
                }
            } catch (e) {
                alert('Blocked: ' + e.message);
            }
        };
    </script>
</body>
</html>
