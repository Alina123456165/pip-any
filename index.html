<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #controlHeader {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #111116; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; border-bottom: 1px solid #22222a; box-sizing: border-box; padding: 10px;
        }

        #pipBtn { 
            width: 90%; max-width: 400px; height: 45px; 
            background: #007AFF; color: white; border: none; font-size: 15px; 
            font-weight: bold; border-radius: 10px; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,122,255,0.3);
        }
        #pipBtn:disabled { background: #1c1c1e; color: #ff9500; border: 1px solid #ff9500; cursor: not-allowed; }
        
        #statusText { color: #8e8e93; font-size: 12px; margin-top: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        canvas { position: absolute; top: 110px; left: 5%; width: 90%; height: auto; border-radius: 8px; background: #111116; display: block; }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; z-index: 99999; pointer-events: none; }
    </style>
</head>
<body>

    <div id="controlHeader">
        <button id="pipBtn" disabled>⏳ RECEIVING SNAPSHOT DATA...</button>
        <div id="statusText">Decoding local payload stream...</div>
    </div>
    
    <canvas id="streamCanvas" width="800" height="1200"></canvas>
    
    <video id="pipMediaTrack" playsinline muted loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="></video>

    <script>
        const video = document.getElementById('pipMediaTrack');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('streamCanvas');
        const status = document.getElementById('statusText');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let base64Data = urlParams.get('img');

        if (base64Data) {
            // Clean up web encoding spaces
            base64Data = base64Data.replace(/ /g, '+');
            
            const nativeImg = new Image();
            nativeImg.src = 'data:image/png;base64,' + base64Data;

            nativeImg.onload = function() {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(nativeImg, 0, 0, canvas.width, canvas.height);
                
                video.srcObject = canvas.captureStream(30);
                
                button.disabled = false;
                button.innerText = "⚡️ POP PAGE INTO FLOATING WINDOW ⚡️";
                status.innerText = "STREAM OVERLAY ACTIVE.";
                
                // Hardware refresh cycle prevents background freezing
                setInterval(() => {
                    ctx.drawImage(nativeImg, 0, 0, canvas.width, canvas.height);
                }, 33);
            };
            
            nativeImg.onerror = function() {
                status.innerText = "Error: Image text data is corrupt or incomplete.";
            };
        } else {
            status.innerText = "Error: Link is missing the screenshot data variable.";
        }

        button.addEventListener('click', async () => {
            try {
                await video.play();
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error(err);
                video.srcObject = canvas.captureStream(30);
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
