<script>
    const video = document.getElementById('pipVideo');
    const button = document.getElementById('pipBtn');
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');

    const urlParams = new URLSearchParams(window.location.search);
    let targetUrl = urlParams.get('url');

    if (!targetUrl) {
        targetUrl = "https://wikipedia.org";
    }

    if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
        targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
    }

    if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
        targetUrl = 'https://' + targetUrl;
    }

    let streamInitialized = false;

    // Direct fallback canvas renderer so PiP never hangs
    function drawFallbackUI(statusMessage) {
        ctx.fillStyle = "#1e1e24";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Decorative Top Bar
        ctx.fillStyle = "#2f2f38";
        ctx.fillRect(0, 0, canvas.width, 80);
        
        // Status Text Indicator
        ctx.fillStyle = "#34c759";
        ctx.beginPath();
        ctx.arc(50, 40, 10, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 24px sans-serif";
        ctx.fillText(statusMessage, 80, 48);

        // Main Display Text Panel
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 32px sans-serif";
        ctx.fillText("Streaming View Link", 50, 200);
        
        ctx.fillStyle = "#0a84ff";
        ctx.font = "20px sans-serif";
        
        // Wrap URL string beautifully if it's too long
        let displayUrl = targetUrl.length > 45 ? targetUrl.substring(0, 42) + "..." : targetUrl;
        ctx.fillText(displayUrl, 50, 250);
        
        ctx.fillStyle = "#8e8e93";
        ctx.font = "16px sans-serif";
        ctx.fillText("Picture-in-Picture Pipeline Active", 50, 300);
    }

    // Default static layout baseline setup
    drawFallbackUI("Initializing Engine...");

    const img = new Image();
    img.crossOrigin = "anonymous"; 
    img.src = "https://image.thum.io/get/width/600/crop/1000/" + targetUrl;

    // Safety Timeout: If thum.io takes longer than 2.5 seconds, activate local engine layout
    const fallbackTimeout = setTimeout(() => {
        if (!streamInitialized) {
            drawFallbackUI("Live Window Link");
            setupStream();
        }
    }, 2500);

    img.onload = function() {
        clearTimeout(fallbackTimeout);
        setInterval(() => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }, 200);
        setupStream();
    };

    img.onerror = function() {
        clearTimeout(fallbackTimeout);
        drawFallbackUI("Live Window Link");
        setupStream();
    };

    function setupStream() {
        if (!streamInitialized) {
            const stream = canvas.captureStream(15); 
            video.srcObject = stream;
            streamInitialized = true;
        }
    }

    button.addEventListener('click', async () => {
        try {
            // Make sure pipeline exists before playing
            setupStream();
            
            await video.play();

            if (video.webkitSetPresentationMode) {
                video.webkitSetPresentationMode('picture-in-picture');
            } else if (document.pictureInPictureEnabled) {
                await video.requestPictureInPicture();
            }
        } catch (err) {
            console.error("PiP Engine Exception: ", err);
            alert("Tap once more to cycle canvas pipeline.");
        }
    });
</script>
