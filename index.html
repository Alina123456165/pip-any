<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #controlHeader {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #111116; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; border-bottom: 1px solid #22222a; box-sizing: border-box; padding: 10px;
        }

        #pipBtn { 
            width: 90%; max-width: 400px; height: 45px; 
            background: #007AFF; color: white; border: none; font-size: 15px; 
            font-weight: bold; border-radius: 10px; cursor: pointer;
        }
        #pipBtn:disabled { background: #3a3a3c; color: #8e8e93; cursor: not-allowed; }
        
        #statusText { color: #8e8e93; font-size: 12px; margin-top: 5px; font-weight: 500; }

        /* The canvas sizing acts as the video aspect ratio container */
        canvas { position: absolute; top: 100px; left: 5%; width: 90%; height: auto; border-radius: 8px; background: #111; display: block; }
        video { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

    <div id="controlHeader">
        <button id="pipBtn" disabled>⏳ CAPTURING WEBPAGE IMAGE...</button>
        <div id="statusText">Initializing image pipeline...</div>
    </div>
    
    <canvas id="streamCanvas" width="800" height="1000"></canvas>
    <video id="pipMediaTrack" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipMediaTrack');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('streamCanvas');
        const status = document.getElementById('statusText');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://en.m.wikipedia.org/wiki/Candy_bar";
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        // Set up initial holding frame
        ctx.fillStyle = "#111116";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.font = "30px sans-serif";
        ctx.fillText("Fetching visual webpage content...", 50, 100);

        // Fetch screenshot via cross-origin friendly public rendering API
        const screenshotUrl = `https://cc-api.com/v1/screenshot?url=${encodeURIComponent(targetUrl)}&width=800&height=1000&viewportWidth=400&viewportHeight=500`;
        
        const webImage = new Image();
        webImage.crossOrigin = "anonymous"; // Bypass Safari CORS defense blocks
        webImage.src = screenshotUrl;

        webImage.onload = function() {
            // Webpage screenshot loaded successfully. Draw it to canvas.
            ctx.drawImage(webImage, 0, 0, canvas.width, canvas.height);
            
            button.disabled = false;
            button.innerText = "⚡️ POP PAGE INTO FLOATING WINDOW ⚡️";
            status.innerText = "Ready! Tap the blue button to float the window.";
        };

        webImage.onerror = function() {
            ctx.fillStyle = "#ff453a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.fillText("Failed to capture website image layout.", 50, 100);
            status.innerText = "Error pulling page image.";
        };

        // Keep the canvas stream active at a low frame rate since it's a static image
        let activeStreamNode = canvas.captureStream(5);
        video.srcObject = activeStreamNode;

        button.addEventListener('click', async () => {
            try {
                activeStreamNode = canvas.captureStream(5);
                video.srcObject = activeStreamNode;
                await video.play();

                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error(err);
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
