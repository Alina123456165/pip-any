<!DOCTYPE html>
<html>
<body style="margin:0; background:#000;">
    <button id="p" style="width:100vw; height:100vh; border:none; background:#222; color:#fff; font-size:24px;">CLICK TO START PIP</button>
    <video id="v" playsinline muted style="display:none;"></video>

    <script>
        const v = document.getElementById('v');
        const p = document.getElementById('p');

        p.onclick = async () => {
            // Force the source immediately on click
            v.src = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
            
            try {
                await v.play();
                if (v.webkitSupportsPresentationMode('picture-in-picture')) {
                    v.webkitSetPresentationMode('picture-in-picture');
                    p.style.display = 'none'; // Hide button after success
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
