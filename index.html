<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
        #controlHeader { position: fixed; top: 0; width: 100%; height: 100px; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        #pipBtn { width: 90%; height: 50px; background: #007AFF; color: white; border-radius: 10px; border: none; font-weight: bold; }
        canvas { position: absolute; top: 120px; left: 5%; width: 90%; height: auto; }
        video { display: none; }
    </style>
</head>
<body>
    <div id="controlHeader">
        <button id="pipBtn">⚡️ LAUNCH IMAGE FROM CLIPBOARD</button>
    </div>
    <canvas id="streamCanvas" width="500" height="800"></canvas>
    <video id="pipMediaTrack" playsinline muted loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="></video>

    <script>
        const video = document.getElementById('pipMediaTrack');
        const canvas = document.getElementById('streamCanvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('pipBtn').onclick = async () => {
            // Fetch the image data directly from your device's clipboard
            const text = await navigator.clipboard.readText();
            const img = new Image();
            img.src = 'data:image/png;base64,' + text;

            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                video.srcObject = canvas.captureStream(30);
                video.play();
                video.webkitSetPresentationMode('picture-in-picture');
            };
        };
    </script>
</body>
</html>
