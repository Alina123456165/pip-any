<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 100; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
        }
        #pipBtn:active { background: #0056b3; }
        
        /* Forces the web view frame container to span the entire screen */
        #webContainer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Invisible native media asset track hook forcing presentation window to trigger */
        video { position: absolute; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0.01; z-index: -1; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP LIVE PAGE INTO FLOATING WINDOW ⚡️</button>
    
    <div id="webContainer">
        <iframe id="liveFrame"></iframe>
    </div>
    
    <video id="pipVideo" playsinline muted loop src="https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-loop-41743-large.mp4"></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const frame = document.getElementById('liveFrame');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        // Load the live page inside the document container viewport
        frame.src = targetUrl;

        button.addEventListener('click', async () => {
            try {
                await video.play();

                if (video.webkitSetPresentationMode) {
                    // Triggers iOS presentation layer immediately
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error("Presentation Target Exception:", err);
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
