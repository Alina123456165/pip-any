<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #launchBtn { padding: 20px 40px; font-size: 20px; background: #FF3B30; border: none; border-radius: 12px; color: white; }
    </style>
</head>
<body>
    <button id="launchBtn">FORCE PIP</button>
    <video id="vid" playsinline muted src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

    <script>
        const vid = document.getElementById('vid');
        document.getElementById('launchBtn').onclick = async () => {
            try {
                await vid.play();
                if (vid.webkitSupportsPresentationMode('picture-in-picture')) {
                    vid.webkitSetPresentationMode('picture-in-picture');
                }
            } catch (err) {
                alert("iOS Error: " + err.message);
            }
        };
    </script>
</body>
</html>
