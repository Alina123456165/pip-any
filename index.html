<!DOCTYPE html>
<html>
<body style="background:black;">
    <button id="p" style="padding: 100px; width: 100%; font-size: 24px;">CLICK ME</button>
    <video id="v" playsinline webkit-playsinline muted src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s.mp4"></video>

    <script>
        const v = document.getElementById('v');
        document.getElementById('p').onclick = async () => {
            try {
                await v.play();
                v.webkitSetPresentationMode('picture-in-picture');
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
