<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #launchBtn { padding: 20px 40px; font-size: 20px; background: #007AFF; border-radius: 12px; border: none; color: white; cursor: pointer; }
        #vid { display: none; }
    </style>
</head>
<body>
    <button id="launchBtn">ENTER PIP</button>
    <video id="vid" playsinline muted></video>

    <script>
        const btn = document.getElementById('launchBtn');
        const vid = document.getElementById('vid');

        // Extract the URL from the query string
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url');

        btn.onclick = async () => {
            if (targetUrl) {
                // Point the video to the source if it's a direct stream
                // Note: Most static sites (Reddit/Wiki) don't have a direct MP4
                // You usually need to find the video element ON the page.
                vid.src = targetUrl; 
                await vid.play();
                
                if (vid.webkitSupportsPresentationMode('picture-in-picture')) {
                    vid.webkitSetPresentationMode('picture-in-picture');
                } else {
                    alert("PiP not supported on this device/browser.");
                }
            } else {
                alert("No URL provided.");
            }
        };
    </script>
</body>
</html>
