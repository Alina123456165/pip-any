<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121214; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        let streamReady = false;
        let domainName = "Webpage View";
        
        try {
            domainName = new URL(targetUrl).hostname.replace('www.', '');
        } catch(e) {}

        // Premium Dark Mode UI layout generator (Fires if the API screenshot lags or is blocked)
        function drawNativeCardUI(statusText) {
            ctx.fillStyle = "#121214";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#1a1a1e";
            ctx.fillRect(0, 0, canvas.width, 90);
            
            ctx.fillStyle = statusText === "Live Pipeline Active" ? "#34c759" : "#ff9500";
            ctx.beginPath();
            ctx.arc(45, 45, 8, 0, 2 * Math.PI);
            ctx.fill();

            ctx.fillStyle = "#a1a1aa";
            ctx.font = "600 18px sans-serif";
            ctx.fillText(statusText.toUpperCase(), 70, 52);

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 42px sans-serif";
            ctx.fillText(domainName, 45, 220);
            
            ctx.fillStyle = "#007AFF";
            ctx.font = "500 20px sans-serif";
            let shortUrl = targetUrl.length > 45 ? targetUrl.substring(0, 42) + "..." : targetUrl;
            ctx.fillText(shortUrl, 45, 280);

            ctx.fillStyle = "#52525b";
            ctx.font = "400 16px sans-serif";
            ctx.fillText("Picture-in-Picture Audio & Canvas Stream Link Active", 45, 340);
        }

        // Draw initial fallback text frame immediately
        drawNativeCardUI("Connecting Stream Context...");

        const img = new Image();
        img.crossOrigin = "anonymous"; 
        
        // UPGRADED ENGINE: Uses Microlink API to pull clean, unblocked screenshots faster
        img.src = "https://api.microlink.io?url=" + encodeURIComponent(targetUrl) + "&screenshot=true&embed=screenshot.url";

        // 3.5 Second Safety Timeout Barrier
        const proxyGuardTimeout = setTimeout(() => {
            if (!streamReady) {
                streamReady = true; 
                setInterval(() => {
                    drawNativeCardUI("Live Pipeline Active");
                }, 250);
            }
        }, 3500);

        img.onload = function() {
            if (streamReady) return; 
            clearTimeout(proxyGuardTimeout);
            streamReady = true;
            setInterval(() => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }, 150);
        };

        img.onerror = function() {
            clearTimeout(proxyGuardTimeout);
            streamReady = true;
            setInterval(() => {
                drawNativeCardUI("Live Pipeline Active");
            }, 250);
        };

        // Initialize standard stream capture
        const stream = canvas.captureStream(15); 
        video.srcObject = stream;

        button.addEventListener('click', async () => {
            try {
                await video.play();

                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error(err);
                // Hard reset the stream if Safari garbage-collects it mid-execution
                video.srcObject = canvas.captureStream(15);
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
