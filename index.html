<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        /* FIX: Pushed down significantly to prevent getting trapped under the Safari header */
        #container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; box-sizing: border-box;
        }

        #pipBtn { 
            width: 100%; max-width: 400px; height: 65px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 16px; cursor: pointer;
            box-shadow: 0px 4px 20px rgba(0,122,255,0.4); transition: transform 0.1s ease;
        }
        #pipBtn:active { transform: scale(0.98); background: #0056b3; }
        
        #statusCard {
            width: 100%; max-width: 400px; background: #12121c; border: 1px solid #1c1c2e;
            border-radius: 16px; padding: 20px; margin-top: 30px; box-sizing: border-box;
        }
        .label { color: #8e8e93; font-size: 12px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .value { color: #ffffff; font-size: 16px; font-weight: 500; word-break: break-all; }
        
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <div id="container">
        <button id="pipBtn">⚡️ POP LIVE PAGE INTO FLOATING WINDOW ⚡️</button>
        
        <div id="statusCard">
            <div class="label">TARGET DOMAIN</div>
            <div id="domVal" class="value">Loading stream...</div>
            <br>
            <div class="label">STREAM STATUS</div>
            <div class="value" style="color: #34C759;">● PIP PIPELINE RE-CENTERED</div>
        </div>
    </div>

    <canvas id="renderCanvas" width="480" height="270" style="display:none;"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }
        if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }

        let domainName = "Webpage Stream";
        try {
            domainName = new URL(targetUrl).hostname.replace('www.', '');
        } catch(e) {}
        
        document.getElementById('domVal').innerText = domainName;

        // Build a beautiful high-contrast text overlay panel layout straight inside the native system stream
        function drawVideoFrame() {
            ctx.fillStyle = "#0a0a0f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Left branding marker accent line
            ctx.fillStyle = "#007AFF";
            ctx.fillRect(0, 0, 8, canvas.height);

            // Domain Text String
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 28px -apple-system, sans-serif";
            ctx.fillText(domainName, 30, 90);

            // Sub-link Text String URL
            ctx.fillStyle = "#0A84FF";
            ctx.font = "14px -apple-system, sans-serif";
            let printUrl = targetUrl.length > 50 ? targetUrl.substring(0, 47) + "..." : targetUrl;
            ctx.fillText(printUrl, 30, 130);

            // Status Bar Context Nodes
            ctx.fillStyle = "rgba(255,255,255,0.05)";
            ctx.fillRect(30, 170, 410, 40);
            
            ctx.fillStyle = "#34C759";
            ctx.beginPath(); ctx.arc(50, 190, 5, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#8e8e93";
            ctx.font = "bold 11px monospace";
            ctx.fillText("LIVE SITE CONTEXT ACTIVE // SECURE SYSTEM LINK", 65, 194);
        }

        // Loop continuous frame refreshes to keep iOS system threads locked active
        setInterval(drawVideoFrame, 100);

        let activeStream = canvas.captureStream(10);
        video.srcObject = activeStream;

        button.addEventListener('click', async () => {
            try {
                activeStream = canvas.captureStream(10);
                video.srcObject = activeStream;
                await video.play();

                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error(err);
                await video.play();
                if (video.webkitSetPresentationMode) video.webkitSetPresentationMode('picture-in-picture');
            }
        });
    </script>
</body>
</html>
