<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #pipBtn { 
            position: absolute; top: 10px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        #pipVideo { position: absolute; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">👉 Tap to Float Page (PiP) 👈</button>
    <iframe src="about:blank" id="webFrame"></iframe>

    <video id="pipVideo" playsinline autoplay muted loop src="https://googleapis.com"></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const frame = document.getElementById('webFrame');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url');

        if (!targetUrl) {
            targetUrl = "https://wikipedia.org";
        } else {
            if(targetUrl.includes("en.wikipedia.org")) {
                targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
            }
        }
        
        frame.src = targetUrl;

        button.addEventListener('click', async () => {
            try {
                await video.play(); 
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    button.style.display = 'none'; 
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    button.style.display = 'none';
                }
            } catch (err) {
                alert("Tap again to initialize canvas.");
            }
        });
    </script>
</body>
</html>
