<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        // This checks for the clean imgLink parameter coming from your shortcut
        const urlParams = new URLSearchParams(window.location.search);
        let imgLink = urlParams.get('imgLink');

        const img = new Image();
        img.crossOrigin = "anonymous"; // Essential step: unblocks iOS canvas rules

        if (imgLink) {
            img.src = imgLink;
        } else {
            // Default text if you open the link manually without the shortcut
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "24px Arial";
            ctx.fillText("Launch this using your custom Share Sheet tool!", 40, 100);
        }

        img.onload = function() {
            // Constantly render the image to canvas to satisfy iOS video streams
            setInterval(() => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }, 100);

            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play().catch(e => console.log("Awaiting finger tap interaction"));
        };

        button.addEventListener('click', async () => {
            try {
                await video.play();
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    button.style.display = 'none';
                }
            } catch (err) {
                alert("Tap once more to engage hardware canvas loop.");
            }
        });
    </script>
</body>
</html>
