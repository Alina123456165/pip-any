<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #pipBtn { 
            position: absolute; top: 15px; left: 5%; width: 90%; height: 50px; 
            background: #007AFF; color: white; border: none; font-size: 16px; 
            font-weight: bold; border-radius: 12px; z-index: 10; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        canvas { display: none; }
        video { position: absolute; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0.01; z-index: 5; }
    </style>
</head>
<body>

    <button id="pipBtn">⚡️ POP PAGE INTO FLOATING WINDOW ⚡️</button>
    <canvas id="renderCanvas" width="600" height="1000"></canvas>
    <video id="pipVideo" playsinline muted loop></video>

    <script>
        const video = document.getElementById('pipVideo');
        const button = document.getElementById('pipBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || "https://wikipedia.org";

        // If it's a desktop Wikipedia link, automatically swap it to mobile layout
        if(targetUrl.includes("en.wikipedia.org") && !targetUrl.includes("en.m.wikipedia.org")) {
            targetUrl = targetUrl.replace("en.wikipedia.org", "en.m.wikipedia.org");
        }

        const img = new Image();
        img.crossOrigin = "anonymous"; // Bypass canvas extraction rules

        // Secure, automated proxy server renders the layout instantly into an image
        img.src = "https://microlink.io" + encodeURIComponent(targetUrl) + "&screenshot=true&embed=screenshot.url";

        img.onload = function() {
            setInterval(() => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }, 100);

            const stream = canvas.captureStream(10); 
            video.srcObject = stream;
            video.play().catch(e => console.log("Awaiting interaction"));
        };

        img.onerror = function() {
            // Draw a quick manual fallback warning box if the website rejects proxy rendering
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "20px Arial";
            ctx.fillText("Webpage layout pending image render loop...", 40, 100);
        };

        button.addEventListener('click', async () => {
            try {
                await video.play();
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode('picture-in-picture');
                    button.style.display = 'none';
                }
            } catch (err) {
                alert("Tap once more to engage hardware canvas loop.");
            }
        });
    </script>
</body>
</html>
